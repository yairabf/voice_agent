services:
  livekit:
    image: livekit/livekit-server:latest
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  voice-agent:
    build: .
    image: voice-agent:local
    depends_on:
      - livekit
    ports:
      - "${VOICE_RUNTIME_PORT:-8088}:8088"
    env_file:
      - .env.example
    environment:
      VOICE_RUNTIME_PORT: 8088
      HERMES_INTEGRATION_MODE: fake
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret
      LIVEKIT_CONTROL_MODE: simulated
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
